<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>폰트</title>

    <style>
        @font-face {
            font-family: pre;
            src: url('fonts/pre.otf');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'YeogiOttaeJalnan';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_four@1.2/JalnanOTF00.woff') format('woff');
            font-weight: normal;
            font-display: swap;
        }
        #d1{
            font-size: 1.5rem;
        }
        #d2{
            font-family: YeogiOttaeJalnan;
            font-size: 1.25rem;
            font-style: italic;
            font-weight: 700;
        }
        section{
            font-family: pre;
            font-size: 20px;
        }
        section > div{
            font-size: 2rem;
        }
        article > div{
            font-size: 50%;
        }


    </style>

</head>
<body>
    <div id="d1">글자1</div>
    <div id="d2">글자2</div>
    <section>
        section
        <div id="d3">글자3</div>
    </section>
    <article>
        article
        <div id="d4">글자4</div>
    </article>


</body>
</html>
