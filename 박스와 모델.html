<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>박스와 인라인</title>
</head>
<body>
    <h2>블록레벨 요소(h1~h6)</h2>
    <div>div</div>
    <section>section</section>
    <article>article</article>
    <aside>aside</aside>
    <header>header</header>
    <main>main</main>
    <footer>footer</footer>
    <nav>nav</nav>
    <hr />
    <h3>텍스트 관련 태그</h3>
    <p>p</p>
    <blockquote>blockquote</blockquote>
    <pre>pre</pre>
    <code>code</code>
    <h3>목록 관련 태그</h3>
    <ul><li>ul-li</li></ul>
    <ol><li>ol-li</li></ol>
    <dl><dt>dl-dl</dt><dd>dl-dd</dd></dl>

    <h2>인라인 태그</h2>
    <span>span</span>
    <a href="#">a</a>
    <b></b>
    <strong>strong</strong>
    <em>em</em>
    <i></i>
    <mark></mark>
    <small></small>
    <sub></sub>
    <sup></sup>
    <del></del>
    <ins></ins>
    <abbr title="asdadad"></abbr>
    <q>q인용구</q>
    <cite>citr</cite>


</body>
</html>
