<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>가정용 꿀사과</title>
</head>
<style>
    section{
        width: 600px;
        margin: auto;
        border: 1px solid #000;
    }
    h2{
        color: white;
    }
    h3{
        color: red;
        text-align: center;
    }
    .box{
        background-color: black;
    }
    div{
        font: bold;
        text-align: center;

    }
    span{
        color: blue;
        font-weight: bold;
    }
</style>
<body>
    <section>
    <h2 class="box">확인하세요</h2>

    <h3> 주문 및 배송</h3>

    <div>
        <span>오후 2시 이전</span> 주문건은 당일 발송합니다 <br>

        2시 이후 주문건은 다음날 발송합니다(주말제외)</div>

    <h3>교환 및 환불</h3>

    <div>
        불만족시 <span>100% 환불</span>해 드립니다.<br>
        고객센터로 전화주세요
    </div>

        <hr>
    <h3>고객센터</h3>

    <div>
        0000-0000 <br>
        상담시간: 오전 9시 ~ 오후 6시 (토/일, 공휴일 휴무)
    </div>
    </section>
</body>
</html>
