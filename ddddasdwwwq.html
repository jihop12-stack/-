<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        table{
            text-align: center;
            width: 300px;
            border: 3px solid blueviolet;
            border-collapse: separate;
            border-spacing: 19px;
        }
        table{
            border-collapse: separate;
        }
        .tt , .qq , .gg ,.yy {
            color: darkgreen;
        }


    </style>
</head>
<body>
<table>
    <tr class="tt">
        <td>구분</td>
        <td>성인</td>
        <td>독자</td>
    </tr>

    <tr>
        <td class="gg">종이책</td>
        <td>6.1권</td>
        <td>11.8권</td>
    </tr>

    <tr>
        <td class="qq">전자책</td>
        <td>1.2권</td>
        <td>7.1권</td>
    </tr>

    <tr>
        <td class="yy">오디오북</td>
        <td>0.2권</td>
        <td>5.5권</td>
    </tr>
</table>


</body>
</html>
