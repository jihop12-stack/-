<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>배경요소</title>
</head>
<style>
    button{
        width: 100px;
        height: 100px;
        border-radius: 50%;
        /* 자식들 중에 버튼을 벗어나는 부분은 가려주세요 */
        overflow: hidden;
        /*text-align: center;*/
    }
    img{
        /*width: 50px;*/
        /*height: 50px;*/
        /*width: 50px;*/
        /*height: 200px;*/
    }
    div{
        /* 한 줄 차지하지 말고 내부 button 크기만 가져라 */
        display: inline-block;
        /* 자식에 absolute 있으면 relative 주세요.! (자신이 absolute가 필요한거 아니면) */
        position: relative;
    }
    #b2{
        display: inline-block;
        border: 3px solid black;
        border-top-color: gold;
        border-left-color: chocolate;
        border-right-color: powderblue;
        border-bottom-color: blue;

        cursor: pointer;
        /*background-color: chocolate;*/
        background-image: url("https://search.pstatic.net/common/?src=http%3A%2F%2Fshop1.phinf.naver.net%2F20200213_266%2F1581576930019ehb2o_JPEG%2F18938472633698529_783316539.jpg&type=sc960_832");
        background-position: center;
        /* contain: 이미지의 가로 혹은 세로를 부모 크기로 맞춰보고 부모까지 닿으면 커지기 중지 (부모 넘어가지 않고 크게 할 수 있는 만큼 까지 크게 해봐) */
        /* cover: 부모를 여백 안남고 꽉 채울 때까지 이미지를 크게 키움 */
        background-size: cover;
        background-repeat: no-repeat;
    }
    #b3{
        display: inline-block;
        /* 부모 위치 기준으로 자리를 잡아라. */
        /* 부모 정하는 기준! => position 이 static이 아닌 부모를 기준으로 함!! */
        position: absolute;
        bottom: 0; /* 부모의 바닥에 붙여라 */
        right: 10px;
        width: 25px;
        height: 25px;
        border: none;

        cursor: pointer;
        background-image: url("https://img.icons8.com/ios/50/camera--v1.png");
        background-size: 50% 50%;
        background-repeat: no-repeat;
        background-position: center;
    }

    section{
        width: 120px;
        height: 200px;
        background-color: powderblue;
        overflow: auto;
    }
</style>
<body>
    <button>
        <img src="https://search.pstatic.net/common/?src=http%3A%2F%2Fblogfiles.naver.net%2FMjAyNTA1MDhfOTAg%2FMDAxNzQ2NjU0MjI3MjIz.Dc-JpI41DlJIDZMck_m3JVI89wfuvLzwohE7bh53Wccg.-RaBAGDGY0CMfzEqgF5sgaKR-7FqKywN6s6wd1sTX2sg.JPEG%2Foutput_2133275469.jpg&type=sc960_832" alt="">
    </button>
    <div>
        <button id="b2"></button>
        <button id="b3"></button>
    </div>

    <section>
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Accusantium corporis hic inventore nostrum quas quibusdam repellendus. A, beatae, blanditiis dolorum eos fugit laborum magnam mollitia odio provident rem sed suscipit!
    </section>










</body>
</html>
